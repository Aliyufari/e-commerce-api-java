application:
  name: "Ecommerce API"
  security:
    jwt:
      issuer: AFGICAFE
      secret-key: 
      expiration: 86400000

spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    driverClassName: org.h2.Driver
    username: sa
    password: password
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop   # fresh schema every test run
    database-platform: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: false          # not needed in tests
  jackson:
    property-naming-strategy: SNAKE_CASE

springdoc:
  api-docs:
    enabled: false            # no need to boot swagger in tests
  swagger-ui:
    enabled: false